<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #container { width: 100vw; height: 100vh; }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: sans-serif; font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="loading">正在連線至歐美安全沙盒...</div>
    <div id="container"></div>

    <script type="module">
        import Hyperbeam from "https://unpkg.com/@hyperbeam/web@latest/dist/index.js";

        async function init() {
            try {
                // 轉打 Vercel 後端 API，徹底解決 CORS 報錯
                const res = await fetch('/api/session');
                const data = await res.json();
                
                if (!data.embed_url) throw new Error("未能獲取 embed_url");

                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('container');

                // 初始化虛擬瀏覽器
                const hb = await Hyperbeam(container, data.embed_url);
                
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "連線失敗，請檢查 Vercel 後端設定！";
            }
        }

        init();
    </script>
</body>
</html>
